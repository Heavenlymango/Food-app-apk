name: CI / CD

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Static analysis + build check ─────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

  # ── Build release APK (main branch + version tags) ────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # TFLite models are too large for git — they must be provided as secrets
      # or downloaded from a private bucket. See ARCHITECTURE.md for details.
      # For local development the models live in assets/models/ on disk.
      - name: Restore TFLite model assets (CI secret)
        if: env.YOLO_MODEL_B64 != ''
        env:
          YOLO_MODEL_B64: ${{ secrets.YOLO_MODEL_B64 }}
          MOBILENET_MODEL_B64: ${{ secrets.MOBILENET_MODEL_B64 }}
        run: |
          echo "$YOLO_MODEL_B64"      | base64 -d > assets/models/yolo_small.tflite
          echo "$MOBILENET_MODEL_B64" | base64 -d > assets/models/mobilenet_food.tflite

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Publish GitHub Release on version tags ────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
