name: food_app1_flutter
description: "Campus Food Ordering App with Food Recognition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Backend
  supabase_flutter: ^2.0.0
  http: ^1.0.0
  # State management
  provider: ^6.0.0
  # Camera & image
  camera: ^0.10.0
  image_picker: ^1.0.0
  image: ^4.0.0
  # ML / TFLite
  tflite_flutter: ^0.12.0
  # Storage & persistence
  shared_preferences: ^2.0.0
  path_provider: ^2.0.0
  # UI helpers
  cached_network_image: ^3.0.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  # Permissions
  permission_handler: ^11.0.0
  # Crypto (SHA256 matching web app)
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/food_labels.txt
    - assets/models/
    - assets/images/
